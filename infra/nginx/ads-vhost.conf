# Orffia Ads Nginx Virtual Host Configuration
# Este arquivo deve ser copiado para o Nginx existente no VPS
# Copiar para: /etc/nginx/sites-available/orffia
# Link: sudo ln -s /etc/nginx/sites-available/orffia /etc/nginx/sites-enabled/
# Recarregar: sudo nginx -t && sudo systemctl reload nginx

# Upstream para API (porta 4000)
upstream orffia_api {
    server 127.0.0.1:4000 fail_timeout=10s max_fails=3;
    keepalive 32;
}

# Upstream para Web (porta 4001)
upstream orffia_web {
    server 127.0.0.1:4001 fail_timeout=10s max_fails=3;
    keepalive 32;
}

# Redirect HTTP para HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name orffia.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name orffia.com;

    # SSL Configuration (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/orffia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orffia.com/privkey.pem;
    ssl_protocols TLSv1.3 TLSv1.2;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Rate Limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req zone=general burst=20 nodelay;

    # Client Body Size
    client_max_body_size 10M;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # API Routes (/api/*)
    location /api/ {
        limit_req zone=auth burst=5 nodelay;  # Mais restritivo para API

        proxy_pass http://orffia_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_set_header Connection "";
        proxy_buffering off;

        # CORS Headers (se necessário)
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Frontend Routes (tudo exceto /api)
    location / {
        proxy_pass http://orffia_web;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }

    # Health Check Endpoint (sem rate limit)
    location /health {
        proxy_pass http://orffia_api/health;
        access_log off;
    }

    # Logs
    access_log /var/log/nginx/orffia-access.log;
    error_log /var/log/nginx/orffia-error.log warn;
}
