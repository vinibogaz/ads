version: '3.9'

# Orffia Ads PRODUCTION — VPS Deployment
# Projeto isolado: docker compose -p orffia -f docker-compose.prod.yml up -d
# Reusa PostgreSQL 15 existente no VPS (não cria container novo)
# Portas: API 4000, Web 4001 (fallback direto)
# Traefik roteia via subdomínio (ver infra/scripts/setup-traefik.sh)

services:
  redis:
    image: redis:7-alpine
    container_name: ads-redis
    restart: always
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - orffia-internal
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    image: ads-api:latest
    container_name: ads-api
    restart: always
    ports:
      - '4002:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      AI_WORKER_URL: http://ai-worker:8000
      AI_WORKER_SECRET: ${AI_WORKER_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
    networks:
      - orffia-internal
      - orffia-external
      - orffia-data
      - root_default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=root_default"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.ads-api-http.rule=Host(`${DOMAIN_API:-api.orffia.com}`)"
      - "traefik.http.routers.ads-api-http.entrypoints=web"
      - "traefik.http.routers.ads-api-http.middlewares=orffia-https-redirect@docker"
      # HTTPS router with TLS
      - "traefik.http.routers.ads-api.rule=Host(`${DOMAIN_API:-api.orffia.com}`)"
      - "traefik.http.routers.ads-api.entrypoints=websecure"
      - "traefik.http.routers.ads-api.tls=true"
      - "traefik.http.routers.ads-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.ads-api.loadbalancer.server.port=4000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:4000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: 'json-file'
      options:
        max-size: '100m'
        max-file: '3'

  ai-worker:
    build:
      context: ../../
      dockerfile: apps/ai-worker/Dockerfile
    image: ads-ai-worker:latest
    container_name: ads-ai-worker
    restart: always
    environment:
      PORT: 8000
      WORKER_SECRET: ${AI_WORKER_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
      PERPLEXITY_API_KEY: ${PERPLEXITY_API_KEY}
      REDIS_URL: ${REDIS_URL}
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - orffia-internal
      - orffia-data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G

  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
    image: ads-web:latest
    container_name: ads-web
    restart: always
    ports:
      - '4003:3000'
    environment:
      # INTERNAL_API_URL: Docker-internal URL used by server-side proxy routes
      INTERNAL_API_URL: http://ads-api:4000
      # NEXT_PUBLIC_API_URL: kept for backwards compat, only used server-side now
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://ads-api:4000}
    networks:
      - orffia-internal
      - orffia-external
      - root_default
    depends_on:
      - api
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/ || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=root_default"
      # HTTP router → redirect to HTTPS (naked + www)
      - "traefik.http.routers.ads-web-http.rule=Host(`${DOMAIN_WEB:-orffia.com}`) || Host(`www.${DOMAIN_WEB:-orffia.com}`)"
      - "traefik.http.routers.ads-web-http.entrypoints=web"
      - "traefik.http.routers.ads-web-http.middlewares=orffia-https-redirect@docker"
      # HTTPS router — naked + www (cert covers both via SAN)
      - "traefik.http.routers.ads-web.rule=Host(`${DOMAIN_WEB:-orffia.com}`) || Host(`www.${DOMAIN_WEB:-orffia.com}`)"
      - "traefik.http.routers.ads-web.entrypoints=websecure"
      - "traefik.http.routers.ads-web.tls=true"
      - "traefik.http.routers.ads-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.ads-web.tls.domains[0].main=${DOMAIN_WEB:-orffia.com}"
      - "traefik.http.routers.ads-web.tls.domains[0].sans=www.${DOMAIN_WEB:-orffia.com}"
      - "traefik.http.routers.ads-web.middlewares=orffia-www-redirect@docker"
      - "traefik.http.services.ads-web.loadbalancer.server.port=3000"
      # Middleware: HTTP → HTTPS permanent redirect
      - "traefik.http.middlewares.orffia-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.orffia-https-redirect.redirectscheme.permanent=true"
      # Middleware: www.orffia.com → orffia.com permanent redirect
      - "traefik.http.middlewares.orffia-www-redirect.redirectregex.regex=^https://www\\.(.+)"
      - "traefik.http.middlewares.orffia-www-redirect.redirectregex.replacement=https://$${1}"
      - "traefik.http.middlewares.orffia-www-redirect.redirectregex.permanent=true"

networks:
  orffia-internal:
    driver: bridge
    internal: true
  orffia-external:
    driver: bridge
  orffia-data:
    # Rede persistente para acesso ao evolution_postgres
    # Criada em deploy.sh e nunca deletada pelo compose down
    external: true
  root_default:
    # Rede do Traefik principal (compartilhada com n8n/outros serviços do VPS)
    # Verificar: docker network ls | grep root_default
    external: true

volumes:
  redis_data:
