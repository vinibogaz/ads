version: '3.9'

# SYNTHEX PRODUCTION — VPS Deployment
# Projeto isolado: docker compose -p synthex -f docker-compose.prod.yml up -d
# Reusa PostgreSQL 15 existente no VPS (não cria container novo)
# Portas: API 4000, Web 4001 (não conflitam com serviços existentes)

services:
  redis:
    image: redis:7-alpine
    container_name: synthex-redis
    restart: always
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - synthex-internal
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    image: synthex-api:latest
    container_name: synthex-api
    restart: always
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      AI_WORKER_URL: http://ai-worker:8000
      AI_WORKER_SECRET: ${AI_WORKER_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
    networks:
      - synthex-internal
      - synthex-external
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:4000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
    logging:
      driver: 'json-file'
      options:
        max-size: '100m'
        max-file: '3'

  ai-worker:
    build:
      context: ../../
      dockerfile: apps/ai-worker/Dockerfile
    image: synthex-ai-worker:latest
    container_name: synthex-ai-worker
    restart: always
    environment:
      PORT: 8000
      WORKER_SECRET: ${AI_WORKER_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REDIS_URL: ${REDIS_URL}
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - synthex-internal
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:8000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G

  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
    image: synthex-web:latest
    container_name: synthex-web
    restart: always
    ports:
      - '4001:3000'
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    networks:
      - synthex-internal
      - synthex-external
    depends_on:
      - api
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/ || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

networks:
  synthex-internal:
    driver: bridge
    internal: true
  synthex-external:
    driver: bridge

volumes:
  redis_data:
